<title>Dano's Network</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;min-height:100vh;background:#f5f5f7;font-family:system-ui,-apple-system,sans-serif}
/* ── Screen 1 ── */
#s1{display:flex;flex-direction:column;min-height:100vh}
header{padding:28px 20px 0;text-align:center}
h1{font-size:24px;font-weight:600;color:#1a1a1a;margin:0 0 4px}
header p{font-size:14px;color:#888;margin:0}
main{flex:1;padding:20px 16px;max-width:560px;margin:0 auto;width:100%}
#sbox{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #ddd;border-radius:16px;padding:10px 14px;transition:border-color .2s;margin-bottom:12px}
#sbox:focus-within{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
#qi{flex:1;border:none;outline:none;font-size:17px;background:transparent;color:#1a1a1a;min-width:0}
#qi::placeholder{color:#aaa}
#clr{width:28px;height:28px;border-radius:50%;border:none;background:#e8e8e8;color:#666;font-size:13px;cursor:pointer;flex-shrink:0;display:none;align-items:center;justify-content:center}
#mic{width:36px;height:36px;border-radius:50%;border:none;background:#f0f0f0;color:#555;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#mic.on{background:#ef4444;color:#fff}
#hints{margin-bottom:4px}
.hlbl{font-size:12px;color:#aaa;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#fff;border:0.5px solid #ddd;border-radius:20px;padding:7px 14px;font-size:13px;color:#555;cursor:pointer}
.chip:active{background:#f0f0f0}
#results{background:#fff;border:0.5px solid #e5e5e5;border-radius:14px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.06)}
#results:empty{display:none}
.ri{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:0.5px solid #f0f0f0}
.ri:last-child{border-bottom:none}
.ri:active{background:#f5f5f7}
.av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#fff}
.rinfo{flex:1;min-width:0}
.rname{font-size:15px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsub{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;flex-shrink:0}
#empty{text-align:center;padding:28px 16px;color:#aaa;font-size:14px;display:none}
#status{font-size:12px;color:#aaa;text-align:center;padding:8px 0 0}
/* ── Screen 2 ── */
#s2{display:none;flex-direction:column;min-height:100vh}
#s2-header{display:flex;align-items:center;gap:12px;padding:16px 16px 12px;background:#fff;border-bottom:0.5px solid #eee;position:sticky;top:0;z-index:10}
#back-btn{width:36px;height:36px;border-radius:50%;border:none;background:#f0f0f0;color:#555;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#s2-title{font-size:17px;font-weight:600;color:#1a1a1a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#s2-body{flex:1;padding:20px 16px;max-width:560px;margin:0 auto;width:100%}
.card{background:#fff;border-radius:16px;border:0.5px solid #e5e5e5;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);margin-bottom:16px}
.card-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.card-av{width:56px;height:56px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff}
.card-name{font-size:20px;font-weight:600;color:#1a1a1a;margin:0 0 3px}
.card-title{font-size:13px;color:#888;margin:0}
.card-org{font-size:14px;color:#555;margin:0 0 12px}
.card-divider{border:none;border-top:0.5px solid #f0f0f0;margin:14px 0}
.card-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;color:#444}
.card-row-label{color:#aaa;font-size:12px;min-width:60px}
.section-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin:0 0 10px}
.path-wrap{display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.path-node{background:#ede9fe;color:#3730a3;border-radius:20px;padding:6px 12px;font-size:14px;font-weight:500}
.path-node.you{background:#7c3aed;color:#fff}
.path-node.target{background:#1d4ed8;color:#fff}
.path-arrow{color:#aaa;font-size:16px}
.direct-badge{background:#d1fae5;color:#065f46;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.btn-primary{flex:1;padding:13px;background:#1d4ed8;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;min-width:140px}
.btn-primary:active{background:#1e40af}
.btn-secondary{flex:1;padding:13px;background:#f3f4f6;color:#374151;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;min-width:140px}
.btn-secondary:active{background:#e5e7eb}
</style>
</head>

function bfs(start,end){
  var prev={},vis=new Set([start]),q=[start];
  while(q.length){var cur=q.shift();if(cur===end)break;(ADJ[cur]||[]).forEach(function(nb){if(!vis.has(nb)){vis.add(nb);prev[nb]=cur;q.push(nb);}});}
  if(!prev[end]&&end!==start)return null;
  var path=[],c=end;while(c){path.unshift(c);c=prev[c];}return path;
}

  var meta=document.createElement("div");
  var nameEl=document.createElement("p");nameEl.className="card-name";nameEl.textContent=p.label;meta.appendChild(nameEl);
  if(p.position){var posEl=document.createElement("p");posEl.className="card-title";posEl.textContent=p.position;meta.appendChild(posEl);}
  top.appendChild(meta);
  card.appendChild(top);

  if(p.org){var orgEl=document.createElement("p");orgEl.className="card-org";orgEl.textContent=p.org;card.appendChild(orgEl);}

  var hr=document.createElement("hr");hr.className="card-divider";card.appendChild(hr);

  var srcRow=document.createElement("div");srcRow.className="card-row";
  var lbl=document.createElement("span");lbl.className="card-row-label";lbl.textContent="Source";srcRow.appendChild(lbl);
  var bdg=document.createElement("span");bdg.className="badge";bdg.style.background=SBG[src]||"#f5f5f5";bdg.style.color=SC[src]||"#888";bdg.textContent=SL[src]||src;srcRow.appendChild(bdg);
  card.appendChild(srcRow);

  if(p.msg_freq>0){var mfRow=document.createElement("div");mfRow.className="card-row";var ml=document.createElement("span");ml.className="card-row-label";ml.textContent="Messages";mfRow.appendChild(ml);var mv=document.createElement("span");mv.style.cssText="color:#d97706;font-weight:500";mv.textContent=p.msg_freq+" LinkedIn messages";mfRow.appendChild(mv);card.appendChild(mfRow);}

  body.appendChild(card);

  // Connection path card
  var pcard=document.createElement("div");pcard.className="card";
  var ptitle=document.createElement("p");ptitle.className="section-title";ptitle.textContent="How you're connected";pcard.appendChild(ptitle);

  if(!path){
    var nopath=document.createElement("p");nopath.style.cssText="font-size:14px;color:#aaa;margin:0";nopath.textContent="No connection path found in your network.";pcard.appendChild(nopath);
  } else if(path.length<=2){
    var direct=document.createElement("div");direct.className="direct-badge";direct.innerHTML="&#x2714; Direct connection";pcard.appendChild(direct);
  } else {
    var pw=document.createElement("div");pw.className="path-wrap";
    path.forEach(function(nid,i){
      var node=document.createElement("span");
      node.className="path-node"+(nid==="me"?" you":i===path.length-1?" target":"");
      node.textContent=IDL[nid]||nid;
      pw.appendChild(node);
      if(i<path.length-1){var arr=document.createElement("span");arr.className="path-arrow";arr.textContent="→";pw.appendChild(arr);}
    });
    pcard.appendChild(pw);
    var hops=path.length-1;
    var hdesc=document.createElement("p");hdesc.style.cssText="font-size:12px;color:#aaa;margin:10px 0 0";hdesc.textContent=hops+" hop"+(hops>1?"s":"")+" away";pcard.appendChild(hdesc);
  }
  body.appendChild(pcard);

  // Action buttons
  var bcard=document.createElement("div");bcard.className="card";
  var brow=document.createElement("div");brow.className="btn-row";
  var nbBtn=document.createElement("button");nbBtn.className="btn-primary";nbBtn.textContent="Show neighborhood";
  nbBtn.dataset.id=id;
  nbBtn.addEventListener("click",function(){alert("Screen 3 coming next — mini graph for: "+p.label);});
  brow.appendChild(nbBtn);
  var backBtn2=document.createElement("button");backBtn2.className="btn-secondary";backBtn2.textContent="Back to search";
  backBtn2.addEventListener("click",showScreen1);
  brow.appendChild(backBtn2);
  bcard.appendChild(brow);
  body.appendChild(bcard);
}

function showScreen1(){
  document.getElementById("s2").style.display="none";
  document.getElementById("s1").style.display="flex";
  window.scrollTo(0,0);
}

document.getElementById("back-btn").addEventListener("click",showScreen1);
document.getElementById("results").addEventListener("click",function(e){var item=e.target.closest(".ri");if(item)showScreen2(item.dataset.id);});
document.querySelectorAll(".chip").forEach(function(c){c.addEventListener("click",function(){var q=this.dataset.q;document.getElementById("qi").value=q;doSearch(q);});});
var inp=document.getElementById("qi");
inp.addEventListener("input",function(){doSearch(this.value);});
inp.addEventListener("search",function(){doSearch(this.value);});
document.getElementById("clr").addEventListener("click",function(){inp.value="";doSearch("");inp.focus();});
if("webkitSpeechRecognition" in window||"SpeechRecognition" in window){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR(),on=false,mb=document.getElementById("mic");
  rec.lang="en-US";rec.interimResults=true;
  mb.addEventListener("click",function(){if(on){rec.stop();}else{rec.start();on=true;mb.classList.add("on");mb.innerHTML="&#x23F9;";}});
  rec.onresult=function(e){var t=e.results[0][0].transcript;inp.value=t;doSearch(t);};
  rec.onend=function(){on=false;mb.classList.remove("on");mb.innerHTML="&#x1F3A4;";};
  rec.onerror=rec.onend;
}else{document.getElementById("mic").style.opacity="0.35";}

</script>
</body>
</html>
