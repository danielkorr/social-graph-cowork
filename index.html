*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;min-height:100vh;background:#f5f5f7;font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column}
header{padding:28px 20px 0;text-align:center}

main{flex:1;padding:20px 16px;max-width:560px;margin:0 auto;width:100%}
#search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #ddd;border-radius:16px;padding:10px 14px;transition:border-color .2s;margin-bottom:12px}
#search-box:focus-within{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
#qi{flex:1;border:none;outline:none;font-size:17px;background:transparent;color:#1a1a1a;min-width:0}
#qi::placeholder{color:#aaa}

#mic-btn{width:36px;height:36px;border-radius:50%;border:none;background:#f0f0f0;color:#555;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#mic-btn.listening{background:#ef4444;color:#fff}
#hints{margin-bottom:4px}
.hint-label{font-size:12px;color:#aaa;margin-bottom:8px}
.hint-chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#fff;border:0.5px solid #ddd;border-radius:20px;padding:7px 14px;font-size:13px;color:#555;cursor:pointer}
.chip:active{background:#f0f0f0}
#results{background:#fff;border:0.5px solid #e5e5e5;border-radius:14px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.06)}
#results:empty{display:none}
.ri{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:0.5px solid #f0f0f0}
.ri:last-child{border-bottom:none}
.ri:active{background:#f5f5f7}
.av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#fff}
.rinfo{flex:1;min-width:0}
.rname{font-size:15px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rname em{font-style:normal;color:#3b82f6}
.rsub{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.rsub em{font-style:normal;color:#3b82f6}
.badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;flex-shrink:0}
#empty{text-align:center;padding:28px 16px;color:#aaa;font-size:14px;display:none}
#status{font-size:12px;color:#aaa;text-align:center;padding:8px 0 0}
</style>

var SC={"linkedin":"#3b82f6","gmail":"#ef4444","iphone":"#16a34a","imported":"#0891b2","2nd-degree":"#d97706"};
var SL={"linkedin":"LinkedIn","gmail":"Gmail","iphone":"iPhone","imported":"Imported","2nd-degree":"2nd°"};
var SBG={"linkedin":"#eff6ff","gmail":"#fef2f2","iphone":"#f0fdf4","imported":"#ecfeff","2nd-degree":"#fffbeb"};
var AVC=["#5b4fcf","#2563eb","#0891b2","#059669","#d97706","#dc2626","#9333ea","#c026d3"];
function ini(n){var p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function avc(n){var h=0;for(var i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))&0xffff;return AVC[h%AVC.length];}
function hl(t,q){if(!q)return t;var i=t.toLowerCase().indexOf(q.toLowerCase());if(i<0)return t;return t.slice(0,i)+"<em>"+t.slice(i,i+q.length)+"</em>"+t.slice(i+q.length);}
function doSearch(q){
  q=q.trim();
  var resEl=document.getElementById("results");
  var emptyEl=document.getElementById("empty");
  var status=document.getElementById("status");
  var hints=document.getElementById("hints");
  var clr=document.getElementById("clear-btn");
  if(!q){resEl.innerHTML="";emptyEl.style.display="none";hints.style.display="";clr.style.display="none";status.textContent="";return;}
  hints.style.display="none";
  clr.style.display="flex";
  var ql=q.toLowerCase();
  var m=PEOPLE.filter(function(p){return p.label.toLowerCase().includes(ql)||(p.org||"").toLowerCase().includes(ql)||(p.position||"").toLowerCase().includes(ql);}).sort(function(a,b){var an=a.label.toLowerCase().startsWith(ql)?0:1,bn=b.label.toLowerCase().startsWith(ql)?0:1;if(an!==bn)return an-bn;return (b.msg_freq||0)-(a.msg_freq||0);}).slice(0,12);
  if(!m.length){resEl.innerHTML="";emptyEl.style.display="block";emptyEl.textContent="No contacts found for “"+q+"”";status.textContent="";return;}
  emptyEl.style.display="none";
  var html="";
  m.forEach(function(p){
    var c=avc(p.label);
    var src=p.source||"linkedin";
    var sub=p.org?p.org:(p.position||"");
    html+="<div class="ri" data-id=""+p.id+"">";
    html+="<div class="av" style="background:"+c+"">"+ini(p.label)+"</div>";
    html+="<div class="rinfo">";
    html+="<div class="rname">"+hl(p.label,q)+(p.msg_freq>0?" <span style="color:#d97706;font-size:11px">★</span>":"")+"</div>";
    if(sub)html+="<div class="rsub">"+hl(sub,q)+"</div>";
    html+="</div>";
    html+="<span class="badge" style="background:"+(SBG[src]||"#f5f5f5")+";color:"+(SC[src]||"#888")+"">"+(SL[src]||src)+"</span>";
    html+="</div>";
  });
  resEl.innerHTML=html;
  status.textContent=m.length===12?"Showing top 12 — type more to narrow":m.length+" match"+(m.length>1?"es":"");
}
document.getElementById("results").addEventListener("click",function(e){
  var item=e.target.closest(".ri");
  if(!item)return;
  selectPerson(item.dataset.id);
});
document.querySelectorAll(".chip").forEach(function(c){
  c.addEventListener("click",function(){
    var q=this.dataset.q;
    document.getElementById("qi").value=q;
    doSearch(q);
  });
});
var inp=document.getElementById("qi");
inp.addEventListener("input",function(){doSearch(this.value);});
inp.addEventListener("search",function(){doSearch(this.value);});
document.getElementById("clear-btn").addEventListener("click",function(){inp.value="";doSearch("");inp.focus();});
function selectPerson(id){
  window._selectedId=id;
  var p=PEOPLE.find(function(x){return x.id===id;});
  if(!p)return;
  alert("Selected: "+p.label+"\nScreen 2 coming next.");
}
if("webkitSpeechRecognition" in window||"SpeechRecognition" in window){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR(),on=false,mb=document.getElementById("mic-btn");
  rec.lang="en-US";rec.interimResults=true;
  mb.addEventListener("click",function(){if(on){rec.stop();}else{rec.start();on=true;mb.classList.add("listening");mb.innerHTML="&#x23F9;";}});
  rec.onresult=function(e){var t=e.results[0][0].transcript;inp.value=t;doSearch(t);};
  rec.onend=function(){on=false;mb.classList.remove("listening");mb.innerHTML="&#x1F3A4;";};
  rec.onerror=rec.onend;
}else{document.getElementById("mic-btn").style.opacity="0.35";}
