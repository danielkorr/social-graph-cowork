<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>Dano's Network</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;min-height:100vh;background:#f5f5f7;font-family:system-ui,-apple-system,sans-serif}
#s1{display:flex;flex-direction:column;min-height:100vh}
header{padding:28px 20px 0;text-align:center}
h1{font-size:24px;font-weight:600;color:#1a1a1a;margin:0 0 4px}
header p{font-size:14px;color:#888;margin:0}
main{flex:1;padding:20px 16px;max-width:560px;margin:0 auto;width:100%}
#sbox{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid #ddd;border-radius:16px;padding:10px 14px;transition:border-color .2s;margin-bottom:12px}
#sbox:focus-within{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
#qi{flex:1;border:none;outline:none;font-size:17px;background:transparent;color:#1a1a1a;min-width:0}
#qi::placeholder{color:#aaa}
#clr{width:28px;height:28px;border-radius:50%;border:none;background:#e8e8e8;color:#666;font-size:13px;cursor:pointer;flex-shrink:0;display:none;align-items:center;justify-content:center}
#mic{width:36px;height:36px;border-radius:50%;border:none;background:#f0f0f0;color:#555;font-size:17px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#mic.on{background:#ef4444;color:#fff}
#hints{margin-bottom:4px}
.hlbl{font-size:12px;color:#aaa;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#fff;border:0.5px solid #ddd;border-radius:20px;padding:7px 14px;font-size:13px;color:#555;cursor:pointer}
.chip:active{background:#f0f0f0}
#results{background:#fff;border:0.5px solid #e5e5e5;border-radius:14px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,0.06)}
#results:empty{display:none}
.ri{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:0.5px solid #f0f0f0}
.ri:last-child{border-bottom:none}
.ri:active{background:#f5f5f7}
.av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:#fff}
.rinfo{flex:1;min-width:0}
.rname{font-size:15px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsub{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.badge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:10px;flex-shrink:0}
#empty{text-align:center;padding:28px 16px;color:#aaa;font-size:14px;display:none}
#status{font-size:12px;color:#aaa;text-align:center;padding:8px 0 0}
#s2{display:none;flex-direction:column;min-height:100vh}
.screen-hdr{background:#fff;border-bottom:0.5px solid #eee;position:sticky;top:0;z-index:10;padding:0 16px}
.screen-hdr-inner{display:flex;align-items:center;gap:12px;max-width:560px;margin:0 auto;padding:14px 0}
.back-btn{width:36px;height:36px;border-radius:50%;border:none;background:#f0f0f0;color:#555;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.scr-title{font-size:17px;font-weight:600;color:#1a1a1a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scr-body{flex:1;padding:20px 16px;max-width:560px;margin:0 auto;width:100%}
.card{background:#fff;border-radius:16px;border:0.5px solid #e5e5e5;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);margin-bottom:16px}
.card-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.card-av{width:56px;height:56px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff}
.card-name{font-size:20px;font-weight:600;color:#1a1a1a;margin:0 0 3px}
.card-sub{font-size:13px;color:#888;margin:0}
.card-org{font-size:14px;color:#555;margin:0 0 12px}
.divider{border:none;border-top:0.5px solid #f0f0f0;margin:12px 0}
.card-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:14px}
.card-lbl{color:#aaa;font-size:12px;min-width:64px}
.sec-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin:0 0 10px}
.path-wrap{display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.pnode{background:#ede9fe;color:#3730a3;border-radius:20px;padding:6px 12px;font-size:14px;font-weight:500}
.pnode.you{background:#7c3aed;color:#fff}
.pnode.tgt{background:#1d4ed8;color:#fff}
.parr{color:#aaa;font-size:16px}
.direct-badge{background:#d1fae5;color:#065f46;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;display:inline-block}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn-p{flex:1;padding:13px;background:#1d4ed8;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;min-width:140px;text-align:center}
.btn-p:active{background:#1e40af}
.btn-s{flex:1;padding:13px;background:#f3f4f6;color:#374151;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;min-width:140px;text-align:center}
.btn-s:active{background:#e5e7eb}
#s3{display:none;flex-direction:column;min-height:100vh}
#graph-section{position:relative;width:100%}
#graph-row{display:flex;align-items:stretch;width:100%}
.grip{width:20px;background:#f0f0f2;border:0.5px solid #e5e5e5;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;flex-shrink:0;transition:background .15s;user-select:none}
.grip:hover{background:#dbeafe;color:#3b82f6}
#grip-l{border-radius:12px 0 0 12px;border-right:none;cursor:w-resize}
#grip-r{border-radius:0 12px 12px 0;border-left:none;cursor:e-resize}
#graph-box{flex:1;background:#fff;border:0.5px solid #e5e5e5;border-left:none;border-right:none;position:relative;min-width:200px;overflow:hidden}
#graph-svg{display:block;width:100%}
#graph-legend{padding:8px 14px;display:flex;flex-wrap:wrap;gap:8px;border-top:0.5px solid #f0f0f0;font-size:11px;color:#888;background:#fff;border-radius:0 0 12px 12px;border:0.5px solid #e5e5e5;border-top:none}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:50%}
#fs-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border:none;background:rgba(255,255,255,0.88);border-radius:6px;cursor:pointer;font-size:15px;color:#555;z-index:10;display:flex;align-items:center;justify-content:center}
#fs-btn:hover{background:#fff;color:#1d4ed8}
#node-tip{position:absolute;background:#1a1a1a;color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;pointer-events:none;display:none;z-index:100;max-width:160px;line-height:1.4}
#s3-actions{padding:14px 16px 24px;max-width:560px;margin:0 auto;width:100%}
@media(max-width:599px){.grip{display:none}#fs-btn{display:none}}
#s3.fullscreen #graph-section{position:fixed;top:0;left:0;right:0;bottom:0;z-index:300}
#s3.fullscreen #graph-row{height:100vh}
#s3.fullscreen #graph-legend,#s3.fullscreen #s3-actions,#s3.fullscreen .screen-hdr{display:none}
#s3.fullscreen #fs-btn{top:12px;right:12px;display:flex}
</style>
</head>
<body>
<div id="s1">
<header><h1>Dano's Network</h1><p id="hdr-count">Loading...</p></header>
<main>
  <div id="sbox">
    <span style="color:#aaa;font-size:18px">&#x1F50D;</span>
    <input id="qi" type="search" placeholder="Name, company, or title..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="clr" aria-label="Clear">&#x2715;</button>
    <button id="mic" aria-label="Voice">&#x1F3A4;</button>
  </div>
  <div id="hints">
    <div class="hlbl">Quick searches</div>
    <div class="chips">
      <span class="chip" data-q="Google">Google</span>
      <span class="chip" data-q="HP">HP</span>
      <span class="chip" data-q="Microsoft">Microsoft</span>
      <span class="chip" data-q="StoryHouse">StoryHouse</span>
      <span class="chip" data-q="Minerva">Minerva</span>
      <span class="chip" data-q="Mobity">Mobity</span>
      <span class="chip" data-q="Alliance">Alliance</span>
    </div>
  </div>
  <div id="empty">No contacts found</div>
  <div id="results"></div>
  <div id="status"></div>
</main>
</div>
<div id="s2">
  <div class="screen-hdr"><div class="screen-hdr-inner">
    <button class="back-btn" id="s2-back">&#x2190;</button>
    <div class="scr-title" id="s2-title">Contact</div>
  </div></div>
  <div class="scr-body" id="s2-body"></div>
</div>
<div id="s3">
  <div class="screen-hdr"><div class="screen-hdr-inner">
    <button class="back-btn" id="s3-back">&#x2190;</button>
    <div class="scr-title" id="s3-title">Neighborhood</div>
    <button class="btn-p" id="s3-expand" style="flex:0;padding:9px 18px;font-size:14px;min-width:0;margin-left:auto">Expand</button>
  </div></div>
  <div id="graph-section">
    <div id="graph-row">
      <div class="grip" id="grip-l">&#x2016;</div>
      <div id="graph-box">
        <svg id="graph-svg"></svg>
        <div id="node-tip"></div>
        <button id="fs-btn" title="Fullscreen">&#x26F6;</button>
      </div>
      <div class="grip" id="grip-r">&#x2016;</div>
    </div>
    <div id="graph-legend">
      <span class="leg-item"><span class="leg-dot" style="background:#7c3aed"></span>You</span>
      <span class="leg-item"><span class="leg-dot" style="background:#1d4ed8"></span>Selected</span>
      <span class="leg-item"><span class="leg-dot" style="background:#3b82f6"></span>LinkedIn</span>
      <span class="leg-item"><span class="leg-dot" style="background:#d97706"></span>2nd&deg;</span>
      <span class="leg-item"><span style="width:16px;height:2px;background:#7c3aed;display:inline-block;vertical-align:middle"></span>Path</span>
    </div>
  </div>
  <div id="s3-actions">
    <div class="btn-row">
      <button class="btn-p" id="s3-viewcard">View full card</button>
      <button class="btn-s" id="s3-backsearch">Back to search</button>
    </div>
  </div>
</div>
<script>// https://d3js.org v7.9.0 Copyright 2010-2023 Mike Bostock

function doSearch(q){
  q=q.trim();
  var res=document.getElementById("results"),empty=document.getElementById("empty"),status=document.getElementById("status"),hints=document.getElementById("hints"),clr=document.getElementById("clr");
  if(!q){res.innerHTML="";empty.style.display="none";hints.style.display="";clr.style.display="none";status.textContent="";return;}
  hints.style.display="none";clr.style.display="flex";
  var ql=q.toLowerCase();
  var m=PEOPLE.filter(function(p){return p.label.toLowerCase().includes(ql)||(p.org||"").toLowerCase().includes(ql)||(p.position||"").toLowerCase().includes(ql);}).sort(function(a,b){var an=a.label.toLowerCase().startsWith(ql)?0:1,bn=b.label.toLowerCase().startsWith(ql)?0:1;if(an!==bn)return an-bn;return (b.msg_freq||0)-(a.msg_freq||0);}).slice(0,12);
  res.innerHTML="";
  if(!m.length){empty.style.display="block";empty.textContent="No contacts found: "+q;status.textContent="";return;}
  empty.style.display="none";
  var frag=document.createDocumentFragment();
  m.forEach(function(p){frag.appendChild(makeItem(p,q));});
  res.appendChild(frag);
  status.textContent=m.length===12?"Showing top 12 — type more to narrow":m.length+" match"+(m.length>1?"es":"");
}

function bfs(start,end){
  var prev={},vis=new Set([start]),q=[start];
  while(q.length){var cur=q.shift();if(cur===end)break;(ADJ[cur]||[]).forEach(function(nb){if(!vis.has(nb)){vis.add(nb);prev[nb]=cur;q.push(nb);}});}
  if(!prev[end]&&end!==start)return null;
  var path=[],c=end;while(c){path.unshift(c);c=prev[c];}return path;
}

  var node=g.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("r",nr).attr("fill",nc).attr("fill-opacity",0.88)

    .style("cursor","pointer")
    .on("click",function(e,dn){if(dn.id!=="me"&&PEOPLE.find(function(p){return p.id===dn.id;}))showScreen2(dn.id);})
    .on("mouseover",function(e,dn){tip.style.display="block";tip.textContent=dn.label+(dn.source==="2nd-degree"?" (2nd°)":"");})
    .on("mousemove",function(e){var r=box.getBoundingClientRect();var x=e.clientX-r.left+12,y=e.clientY-r.top+12;if(x+170>W)x-=180;tip.style.left=x+"px";tip.style.top=y+"px";})
    .on("mouseout",function(){tip.style.display="none";});
  g.append("g").selectAll("text").data(nodes).join("text")
    .text(function(dn){return dn.id==="me"?"Me":dn.label.split(" ")[0];})
    .attr("font-size",function(dn){return dn.id==="me"||dn.id===_curId?11:9;})
    .attr("fill","#333").attr("text-anchor","middle")
    .attr("dy",function(dn){return -nr(dn)-3;})
    .style("pointer-events","none").style("user-select","none");
  node.call(d3.drag()
    .on("start",function(e,dn){if(!e.active)sim.alphaTarget(0.3).restart();dn.fx=dn.x;dn.fy=dn.y;})
    .on("drag",function(e,dn){dn.fx=e.x;dn.fy=e.y;})
    .on("end",function(e,dn){if(!e.active)sim.alphaTarget(0);dn.fx=null;dn.fy=null;}));
  var sim=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(function(dn){return dn.id;}).distance(65).strength(0.5))
    .force("charge",d3.forceManyBody().strength(-130))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collision",d3.forceCollide().radius(function(dn){return nr(dn)+5;}))
    .alphaDecay(0.04).stop();
  sim.tick(200);
  link.attr("x1",function(dn){return dn.source.x;}).attr("y1",function(dn){return dn.source.y;}).attr("x2",function(dn){return dn.target.x;}).attr("y2",function(dn){return dn.target.y;});
  node.attr("cx",function(dn){return dn.x;}).attr("cy",function(dn){return dn.y;});
  g.selectAll("text").attr("x",function(dn){return dn.x;}).attr("y",function(dn){return dn.y;});
  var xs=nodes.map(function(n){return n.x;}),ys=nodes.map(function(n){return n.y;});
  var x0=Math.min.apply(null,xs),x1=Math.max.apply(null,xs),y0=Math.min.apply(null,ys),y1=Math.max.apply(null,ys);
  var pad=28,sc=Math.min((W-pad*2)/(x1-x0||1),(H-pad*2)/(y1-y0||1),2.8);
  svg.call(zb.transform,d3.zoomIdentity.translate(W/2-sc*(x0+x1)/2,H/2-sc*(y0+y1)/2).scale(sc));
  sim.on("tick",function(){
    link.attr("x1",function(dn){return dn.source.x;}).attr("y1",function(dn){return dn.source.y;}).attr("x2",function(dn){return dn.target.x;}).attr("y2",function(dn){return dn.target.y;});
    node.attr("cx",function(dn){return dn.x;}).attr("cy",function(dn){return dn.y;});
    g.selectAll("text").attr("x",function(dn){return dn.x;}).attr("y",function(dn){return dn.y;});
  }).alphaDecay(0.06).alpha(0.1).restart();
}

document.getElementById("s3-expand").addEventListener("click",function(){showScreen3(!_expanded);});
document.getElementById("s3-back").addEventListener("click",function(){showScreen2(_curId);});
document.getElementById("fs-btn").addEventListener("click",function(){
  var s3el=document.getElementById("s3");
  var isFs=s3el.classList.toggle("fullscreen");
  document.getElementById("fs-btn").innerHTML=isFs?"&#x2715;":"&#x26F6;";
  setTimeout(function(){if(_curId)showScreen3(_expanded);},60);
});
var graphRow=document.getElementById("graph-row");
function setupGrip(handle,side){
  if(!handle)return;
  var dragging=false,startX=0,startW=0;
  handle.addEventListener("mousedown",function(e){dragging=true;startX=e.clientX;startW=graphRow.offsetWidth;document.body.style.cursor="ew-resize";e.preventDefault();});
  document.addEventListener("mousemove",function(e){if(!dragging)return;var dx=e.clientX-startX;var newW=Math.max(300,side==="right"?startW+dx:startW-dx);graphRow.style.width=newW+"px";graphRow.style.margin="0 auto";});
  document.addEventListener("mouseup",function(){if(!dragging)return;dragging=false;document.body.style.cursor="";setTimeout(function(){if(_curId)showScreen3(_expanded);},60);});
}
setupGrip(document.getElementById("grip-l"),"left");
setupGrip(document.getElementById("grip-r"),"right");
document.getElementById("s2-back").addEventListener("click",function(){show("s1");});
document.getElementById("results").addEventListener("click",function(e){var item=e.target.closest(".ri");if(item)showScreen2(item.dataset.id);});
document.querySelectorAll(".chip").forEach(function(c){c.addEventListener("click",function(){var q=this.dataset.q;document.getElementById("qi").value=q;doSearch(q);});});
var inp=document.getElementById("qi");
inp.addEventListener("input",function(){doSearch(this.value);});
inp.addEventListener("search",function(){doSearch(this.value);});
document.getElementById("clr").addEventListener("click",function(){inp.value="";doSearch("");inp.focus();});
if("webkitSpeechRecognition" in window||"SpeechRecognition" in window){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR(),on=false,mb=document.getElementById("mic");
  rec.lang="en-US";rec.interimResults=true;
  mb.addEventListener("click",function(){if(on){rec.stop();}else{rec.start();on=true;mb.classList.add("on");mb.innerHTML="&#x23F9;";}});
  rec.onresult=function(e){var t=e.results[0][0].transcript;inp.value=t;doSearch(t);};
  rec.onend=function(){on=false;mb.classList.remove("on");mb.innerHTML="&#x1F3A4;";};
  rec.onerror=rec.onend;
}else{document.getElementById("mic").style.opacity="0.35";}

</script>
